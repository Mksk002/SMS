<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Management System</title>
    <style>
        /* Reset and Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            /* Academic Navy to Teal Gradient */
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        /* Glassmorphism University Banner */
        .header {
            background-color: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #ffffff;
            width: 100%;
            text-align: center;
            padding: 25px 0;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 1.5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* Refined Login Card */
        .login-box {
            background-color: #ffffff;
            padding: 40px 50px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            margin-top: 80px;
            width: 100%;
            max-width: 420px;
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #2c3e50;
            font-size: 24px;
        }

        /* Form Elements */
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #dcdcdc;
            border-radius: 6px;
            font-size: 15px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #2980b9;
            box-shadow: 0 0 8px rgba(41, 128, 185, 0.2);
        }

        /* Collegiate Gold Button */
        button {
            background-color: #d4af37; /* Metallic Gold */
            color: #1a1a1a;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s ease, transform 0.1s ease;
            margin-top: 10px;
        }

        button:hover {
            background-color: #c5a028;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(1px);
        }

        /* Upgraded Error Alert */
        .error {
            background-color: #fdeaea;
            color: #c0392b;
            padding: 12px;
            border-radius: 6px;
            border-left: 4px solid #c0392b;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 20px;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="header">Welcome To Login Portal</div>

    <div class="login-box">
        <h2>Sign In</h2>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="error">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <label for="role">Select Role</label>
            <select name="role" id="role">
                <option value="Admin">Administrator</option>
                <option value="Teacher">Faculty</option>
                <option value="Student">Student</option>
            </select>

            <label for="uid">User ID / Roll Number</label>
            <input type="text" name="uid" id="uid" required placeholder="e.g., 2026CS101">

            <label for="password">Password</label>
            <input type="password" name="password" id="password" required placeholder="Enter your password">

            <button type="submit">Secure Login</button>
        </form>
    </div>

</body>
</html>
